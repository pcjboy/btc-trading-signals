version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "18888:8080"
    environment:
      - DATA_COLLECTOR_URL=http://data-collector:8001
      - ANALYZER_URL=http://analyzer:8002
      - SIGNAL_GENERATOR_URL=http://signal-generator:8003
      - ALPHA_MINER_URL=http://alpha-miner:8004
      - RISK_MODEL_URL=http://risk-model:8005
      - PORTFOLIO_OPTIMIZER_URL=http://portfolio-optimizer:8006
      - ORDER_EXECUTOR_URL=http://order-executor:8007
      - PORT=8080
    depends_on:
      data-collector:
        condition: service_started
      analyzer:
        condition: service_started
      signal-generator:
        condition: service_started
      alpha-miner:
        condition: service_started
      risk-model:
        condition: service_started
      portfolio-optimizer:
        condition: service_started
      order-executor:
        condition: service_started
    networks:
      - btc-network

  data-collector:
    build:
      context: ./data-collector
      dockerfile: Dockerfile
    ports:
      - "18001:8001"
    environment:
      - PORT=8001
    volumes:
      - data-collector-data:/app/data
    networks:
      - btc-network

  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    ports:
      - "18002:8002"
    environment:
      - PORT=8002
      - DATA_COLLECTOR_URL=http://data-collector:8001
    depends_on:
      data-collector:
        condition: service_started
    networks:
      - btc-network

  signal-generator:
    build:
      context: ./signal-generator
      dockerfile: Dockerfile
    ports:
      - "18003:8003"
    environment:
      - PORT=8003
      - ANALYZER_URL=http://analyzer:8002
      - DATA_COLLECTOR_URL=http://data-collector:8001
    volumes:
      - signal-generator-data:/app/data
    depends_on:
      analyzer:
        condition: service_started
      data-collector:
        condition: service_started
    networks:
      - btc-network

  alpha-miner:
    build:
      context: ./alpha-miner
      dockerfile: Dockerfile
    ports:
      - "18004:8004"
    environment:
      - PORT=8004
      - DATA_COLLECTOR_URL=http://data-collector:8001
    depends_on:
      data-collector:
        condition: service_started
    networks:
      - btc-network

  risk-model:
    build:
      context: ./risk-model
      dockerfile: Dockerfile
    ports:
      - "18005:8005"
    environment:
      - PORT=8005
      - DATA_COLLECTOR_URL=http://data-collector:8001
    depends_on:
      data-collector:
        condition: service_started
    networks:
      - btc-network

  portfolio-optimizer:
    build:
      context: ./portfolio-optimizer
      dockerfile: Dockerfile
    ports:
      - "18006:8006"
    environment:
      - PORT=8006
      - DATA_COLLECTOR_URL=http://data-collector:8001
    depends_on:
      data-collector:
        condition: service_started
    networks:
      - btc-network

  order-executor:
    build:
      context: ./order-executor
      dockerfile: Dockerfile
    ports:
      - "18007:8007"
    environment:
      - PORT=8007
      - DATA_COLLECTOR_URL=http://data-collector:8001
      - SIGNAL_GENERATOR_URL=http://signal-generator:8003
    depends_on:
      data-collector:
        condition: service_started
      signal-generator:
        condition: service_started
    networks:
      - btc-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - btc-network

volumes:
  data-collector-data:
  signal-generator-data:

networks:
  btc-network:
    driver: bridge
